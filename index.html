<!doctype html>
<html>
	<head>
		<meta charset="UTF-8">
		<link href="assets/favicon.png" rel="icon" type="image/png">
		<title>MLBIS Dumper</title>
		<style>
			@font-face {
				font-family: 'Red Hat Mono';
				src: url('./assets/redhat-mono.ttf');
			}

			@font-face {
				font-family: 'Red Hat Text';
				src: url('./assets/redhat-text.ttf');
			}

			:root {
				/*--bg: #ededed;
				--fg: #212121;
				--fg-dim: #646464;
				--fg-strong: #0000ff;
				--line: #8b8b8b;
				--red: #f22;

				--button-bg: #ddeeff;
				--button-fg: #06c;
				--button-fg-hover: #6ff;

				--dropdown-bg: #e3ddee;
				--dropdown-fg: #76f;
				--dropdown-fg-hover: #cbf;
				--dropdown-opt-bg: #cac5dd;
				--dropdown-opt-fg: #6a6677;
				--dropdown-opt-fg-hover: #aaa1dd;

				--checkbox-bg: #ddffdd;
				--checkbox-fg: #33ff33;
				--checkbox-fg-hover: #88ff88;
				--checkbox-not-fg: #22cc22;
				--checkbox-not-fg-hover: #33ff33;*/

				/* Catppuccin Mocha, mapped from Display-P3 to sRGB (gives colors a little kick) */
				--mauve: #d2a4fd;
				--red: #ff84a8;
				--maroon: #f89cab;
				--peach: #ffa77f;
				--yellow: #fee1ab;
				--green: #94e59a;
				--teal: #79e5d5;
				--sky: #6adfed;
				--sapphire: #52caf0;
				--blue: #7db6ff;
				--lavender: #b2beff;
				--text: #cbd6f7;
				--subtext1: #b8c2e1;
				--subtext0: #a4adca;
				--overlay2: #9299b4;
				--overlay1: #7e849e;
				--overlay0: #6b7088;
				--surface2: #575b72;
				--surface1: #45475c;
				--surface0: #313245;

				--bg: #11111b;
				--fg: var(--subtext0);
				--fg-dim: var(--overlay0);
				--fg-strong: #e4eafc;
				--line: var(--surface0);

				--button-fg: #1d9ff5;
				--button-bg: #0d131e;
				--button-fg-hover: #71e8fe;

				--dropdown-fg: #8b6cff;
				--dropdown-bg: #120e25;
				--dropdown-fg-hover: #dcbbff;
				--dropdown-opt-fg: #8681a2;
				--dropdown-opt-bg: #120f1f;
				--dropdown-opt-fg-hover: #dedaef;

				--checkbox-fg: #4eee8b;
				--checkbox-bg: #0b170e;
				--checkbox-fg-hover: #beffd0;
				--checkbox-not-fg: #1f924e;
				--checkbox-not-fg-hover: #00e475;
			}

			* { box-sizing: border-box; margin: 0; }
			body { background: var(--bg); color: var(--fg); font-family: 'Red Hat Text'; overflow-x: hidden; }

			#title {
				left: 50vw; line-height: 2; position: absolute; text-align: center; top: 50vh;
				transform: translate(-50%, -50%);
			}

			canvas { display: block; image-rendering: pixelated; }

			section { border-bottom: 1px solid var(--line); position: relative; width: 100vw; }
			section .reveal { line-height: 31px; user-select: none; padding: 0 5px; }
			section .reveal:hover { color: var(--fg-strong); }
			section .content { width: calc(100% - 32px); padding: 20px; padding-left: 52px; }

			label { padding: 0 5px; user-select: none; }

			code { font-family: 'Red Hat Mono'; }

			button {
				background: var(--button-bg); border: 1px solid var(--button-fg); color: var(--button-fg);
				display: inline-block; font: inherit; font-size: calc(1em - 2px); height: calc(1em + 8px); line-height: calc(1em + 6px);
				margin: 1px; max-height: unset; min-width: 1.4em; padding: 0 0.5em;
			}
			button:hover { color: #9cf; }

			.dropdown * { user-select: none; }
			.dropdown .left:hover, .dropdown .selection:hover, .dropdown .right:hover {
				color: var(--dropdown-fg-hover);
			}
			.dropdown:has(.selection:hover) .vee { color: var(--dropdown-fg-hover); }
			.dropdown .option:hover { color: var(--dropdown-opt-fg-hover); }

			.checkbox { border: 1px solid var(--checkbox-not-fg); user-select: none; }
			.checkbox * { color: var(--checkbox-not-fg); }
			.checkbox .check { opacity: 0; }
			.checkbox:hover * { color: var(--checkbox-not-fg-hover); }
			.checkbox:not(.checked):hover .check { opacity: 0.2; }
			.checkbox.checked { border-color: var(--checkbox-fg); }
			.checkbox.checked .check { opacity: 1; }
			.checkbox.checked * { color: var(--checkbox-fg); }
			.checkbox.checked:hover * { color: var(--checkbox-fg-hover); }

			table.bordered { border-collapse: collapse; }
			table.bordered td, table.bordered th { border: 1px solid var(--line); padding: 5px; }

			.clicky {
				--clicky-text: var(--fg); --clicky-bg: transparent; --clicky-box: var(--overlay2);
				--clicky-fill: var(--surface1);
			}
			.clicky:nth-child(even) { --clicky-text: var(--fg-dim); }
			.clicky:nth-child(odd) { --clicky-bg: var(--surface0); }
			.clicky:hover { --clicky-text: var(--fg-strong); --clicky-box: var(--text); }

			.clicky.red {
				--clicky-text: var(--red); --clicky-bg: transparent; --clicky-box: var(--red);
				--clicky-fill: #ff84a833;
			}
			.clicky.red:hover { --clicky-text: #ffc5d3; --clicky-box: #ffc5d3; }

			.clicky.green {
				--clicky-text: var(--green); --clicky-bg: transparent; --clicky-box: var(--green);
				--clicky-fill: #94e59a33;
			}
			.clicky.green:hover { --clicky-text: #c7ffcb; --clicky-box: #c7ffcb; }

			.clicky.active { --clicky-text: var(--fg-strong); --clicky-box: var(--text); --clicky-bg: var(--surface1); }
		</style>
	</head>
	<body>
		<div id="title">
			<div>Use any Mario and Luigi: Bowser's Inside Story ROM<br>(JP/ROC/NA/EU/KO, or NA/EU Kiosk Demos)</div>
			<label for="file-input">
				<button onmousedown="document.getElementById('file-input').click()" style="height: 1em; padding: 20px; line-height: calc(1em - 40px);">Choose File</button>
			</label>
			<input id="file-input" style="display: none;" type="file" accept=".nds" />
			<div>Source Code: <a href="https://github.com/8y8x/mlbis-dumper" style="color: #76f;">GitHub</a></div>
			<div id="loaded">0 modules loaded</div>
		</div>

		<div id="title-bottom">
		</div>

		<template id="dropdown">
			<div class="dropdown" style="display: inline-block; background: var(--dropdown-bg); border: 1px solid var(--dropdown-fg);
			color: var(--dropdown-fg); font-size: calc(1em - 2px); height: calc(1em + 8px); line-height: calc(1em + 6px); width: fit-content; text-wrap: nowrap;
			position: relative; margin: 1px;"><!--
				--><span class="left" style="display: inline-block; text-align: center; width: calc(1em + 6px)">
					<svg viewbox="0 0 16 16" style="height: calc(1em + 6px); aspect-ratio: 1; vertical-align: bottom">
						<path stroke="currentColor" stroke-width="1" fill="none" d="M10,5 L7,8 L10,11"></path>
					</svg>
				</span><!--
				--><span class="selection" style="display: inline-block; padding: 0 0.5em"></span><!--
				--><span class="vee" style=" display: none; text-align: center; width: calc(1em + 6px); position: absolute;
				right: 0; pointer-events: none;">
					<svg viewbox="0 0 16 16" style="height: calc(1em + 6px); vertical-align: bottom">
						<path stroke="currentColor" stroke-width="1" fill="none" d="M5,7 L8,10 L11,7"></path>
					</svg>
				</span><!--
				--><span class="right" style="display: inline-block; text-align: center; width: calc(1em + 6px)">
					<svg viewbox="0 0 16 16" style="height: calc(1em + 6px); aspect-ratio: 1; vertical-align: bottom">
						<path stroke="currentColor" stroke-width="1" fill="none" d="M8,5 L11,8 L8,11"></path>
					</svg>
				</span><!--

				--><div class="options" style="background: var(--dropdown-opt-bg); border: 1px solid var(--dropdown-fg); color: var(--dropdown-opt-fg);
				visibility: hidden; position: absolute; top: calc(1em + 8px); left: -1px; padding: 0 calc(1.5em + 6px); max-height: 100vh;
				width: fit-content; overflow-y: auto; overscroll-behavior: none; z-index: 10;"></div><!--
				--><div class="option" style="height: calc(1em + 4px); line-height: calc(1em + 4px)"></div><!--
			--></div>
		</template>

		<template id="checkbox">
			<div class="checkbox" style="background: var(--checkbox-bg); display: inline-block; font-size: calc(1em - 2px); height: calc(1em + 8px);
			line-height: calc(1em + 6px); text-wrap: nowrap; padding: 0 0.5em 0 0.25em; margin: 1px;"><!--
				--><span class="check" style="display: inline-block; aspect-ratio: 1; height: calc(1em + 6px)">
					<svg viewbox="0 0 15 16" style="width: 100%; height: 100%; vertical-align: bottom">
						<path stroke="currentColor" stroke-width="1" fill="none" d="M3,8.5 L6,11.5 L12,5.5"></path>
					</svg>
				</span><!--
				--><span class="label" style="display: inline-block"></span><!--
			--></div>
		</template>

		<script src="index.js"></script>
		<script src="algorithms.js"></script>
		<script src="disassembler.js"></script>
		<script src="field.js"></script>
	</body>
</html>
